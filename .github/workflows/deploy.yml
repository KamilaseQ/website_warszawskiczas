name: Build & verify (Next.js server)

# Strona działa jako aplikacja Next.js (server) na Hostingerze — Hostinger
# importuje i buduje kod z GitHuba. Ten workflow tylko WERYFIKUJE, że build
# przechodzi (typecheck + next build). Wdrożenie robi Hostinger ze swojego
# integracyjnego pull-a z repozytorium.
on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

concurrency:
  group: verify-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Typecheck
        run: npm run lint

      - name: Build (Next.js server)
        run: npm run build
        env:
          # Publiczny endpoint leadów (lead + WhatsApp w aplikacji CMS).
          # Wysyłka maili NIE zależy od tej zmiennej — robi to /api/contact (SMTP env).
          NEXT_PUBLIC_CMS_LEAD_URL: https://api.camalio.pl/api/v1/leads
          NEXT_PUBLIC_CDN_BASE_URL: ${{ secrets.NEXT_PUBLIC_CDN_BASE_URL || 'https://cdn.camalio.pl' }}
          NEXT_PUBLIC_PRIVATE_COLLECTION_CODE: ${{ secrets.NEXT_PUBLIC_PRIVATE_COLLECTION_CODE }}

      - name: Verify server build artifact
        run: test -d .next
